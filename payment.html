<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="format-detection" content="telephone=no">
  <title>결제 | BzCat</title>
  <link rel="icon" href="/img/favicon.png" type="image/png">
  <link rel="stylesheet" href="/styles.css">
  <script src="https://js.tosspayments.com/v2/standard"></script>
</head>
<body class="payment-widget-page">
  <div class="payment-widget-inner">
    <header class="payment-widget-header">
      <a href="/" class="payment-widget-logo-link" id="paymentHomeLink" aria-label="홈으로">
        <img src="/img/bzcat_logo.png" alt="BzCat" class="payment-widget-logo">
      </a>
    </header>

    <div id="paymentLoading" class="payment-widget-loading" aria-live="polite">
      <div class="payment-widget-spinner" role="status" aria-label="로딩 중"></div>
      <p class="payment-widget-loading-text">결제 정보를 불러오는 중입니다.</p>
    </div>

    <div id="paymentError" class="payment-widget-panel payment-widget-error" style="display: none;" role="alert">
      <p id="paymentErrorText" class="payment-widget-error-text"></p>
      <button type="button" class="btn-payment-widget-secondary" id="paymentErrorBack">주문 화면으로 돌아가기</button>
    </div>

    <div id="paymentMain" class="payment-widget-panel" style="display: none;">
      <p class="payment-widget-lead">결제창으로 이동 중입니다.</p>
      <div id="paymentOrderSummary" class="payment-widget-summary"></div>
      <div class="payment-widget-actions">
        <button type="button" class="btn-payment-widget-primary" id="btnPaymentSubmit" disabled style="display:none;">결제하기</button>
        <button type="button" class="btn-payment-widget-secondary" id="btnPaymentCancel">이전으로</button>
      </div>
    </div>
  </div>
  <script src="/payment.js"></script>
</body>
</html>
